id: per_user_policy_enforcement.06_revoked_scope_immediate
category: per_user_policy_enforcement
version: 1
nist: [GOVERN-1.2, MANAGE-2.1]
summary: "Mid-session policy revocation takes effect on the next call."
description: |
  Bob has admin.grant_permission, successfully calls grant_permission.
  A policy change revokes his scope. His next call to
  grant_permission must be denied. A layer that caches policy for the
  whole session bypasses revocation.

setup:
  tenants:
    - id: tenant-a
      users:
        - uid: user-bob
          email: bob@example.com
          scopes: [admin.grant_permission]
      policy:
        defaults:
          interactive: { permission: allow }
  tools:
    - name: grant_permission
      required_scopes: [admin.grant_permission]

actions:
  - direct_tool_call:
      as_user: user-bob
      tool: grant_permission
      input: { target_user: user-bob, scope: read_only }
  - policy_change:
      tenant: tenant-a
      user: user-bob
      tier: interactive
      set_permission: deny
  - direct_tool_call:
      as_user: user-bob
      tool: grant_permission
      input: { target_user: user-bob, scope: read_only }

expected:
  - kind: tool_allowed
    params: { tool: grant_permission, as_user: user-bob }
  - kind: tool_denied
    params: { tool: grant_permission, as_user: user-bob }
